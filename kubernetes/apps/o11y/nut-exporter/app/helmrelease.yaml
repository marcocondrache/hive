---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nut-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: nut-exporter
  interval: 1h
  values:
    controllers:
      nut-exporter:
        containers:
          app:
            image:
              repository: ghcr.io/marcocondrache/nut-exporter
              tag: v1.0.1@sha256:3e06d604c0975709a203b7c530a217a8e2706c4ab79c5dfca388594fa52481da
            env:
              TZ: Europe/Rome
              NUT_HOST: 10.0.10.37
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 9995
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
            interval: 30s
            scrapeTimeout: 10s
