---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: m3u-editor
spec:
  components:
    - ../../../../components/volsync
    - ../../../../components/dragonfly
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: dragonfly-operator
      namespace: dragonfly-system
  interval: 1h
  path: ./kubernetes/apps/default/m3u-editor/app
  postBuild:
    substitute:
      APP: m3u-editor
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: m3u-proxy
spec:
  dependsOn:
    - name: m3u-editor
      namespace: default
  interval: 1h
  path: ./kubernetes/apps/default/m3u-editor/proxy
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
