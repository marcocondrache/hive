---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/issuer_v1.json
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: home-assistant-client-ca-bootstrap
spec:
  selfSigned: {}
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-assistant-client-ca
spec:
  commonName: home-assistant-client-ca
  duration: 87600h
  isCA: true
  issuerRef:
    kind: Issuer
    name: home-assistant-client-ca-bootstrap
  privateKey:
    algorithm: ECDSA
    rotationPolicy: Never
    size: 256
  secretName: home-assistant-client-ca
  usages:
    - cert sign
    - crl sign
    - digital signature
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/issuer_v1.json
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: home-assistant-client-ca
spec:
  ca:
    secretName: home-assistant-client-ca
