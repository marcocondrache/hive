---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gluetun
spec:
  chartRef:
    kind: OCIRepository
    name: gluetun
  interval: 1h
  values:
    controllers:
      gluetun:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
            env:
              TZ: Europe/Rome
              HTTPPROXY: "on"
              HTTPPROXY_LISTENING_ADDRESS: ":8080"
              DNS_UPSTREAM_IPV6: "on"
              HEALTH_SERVER_ADDRESS: ":9999"
              FIREWALL_INPUT_PORTS: 9999,8080
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            lifecycle:
              postStart:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - (ip rule del table 51820; ip -6 rule del table 51820) || true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              capabilities: { add: ["NET_ADMIN"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: gluetun
        ipFamilyPolicy: RequireDualStack
        ipFamilies:
          - IPv4
          - IPv6
        ports:
          httpProxy:
            port: 8080
            protocol: TCP
    persistence:
      gluetun:
        type: emptyDir
        globalMounts:
          - path: /gluetun
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
