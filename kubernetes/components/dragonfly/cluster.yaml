---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: ${APP}-dragonfly
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.38.1
  replicas: ${DRAGONFLY_REPLICAS:=1}
  args:
    - --maxmemory=${DRAGONFLY_MAX_MEMORY:=256Mi}
    - --proactor_threads=${DRAGONFLY_PROACTOR_THREADS:=1}
    - --cluster_mode=emulated
  resources:
    requests:
      cpu: 25m
    limits:
      memory: ${DRAGONFLY_MEMORY_LIMIT:=384Mi}
